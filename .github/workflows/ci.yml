name: CI/CD

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PASS: ${{ secrets.DOCKER_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set variables
        run: |
          if [ "${{ github.repository_owner }}" == "Securing-DevOps" ]; then
            echo "DOCKER_REPO=securingdevops" >> $GITHUB_ENV
          else
            echo "DOCKER_REPO=${DOCKER_USER}" >> $GITHUB_ENV
          fi

      - name: Test
        run: go test ./...

      - name: Build binary
        run: |
          mkdir -p bin
          go build -ldflags '-extldflags "-static"' -o bin/invoicer

      - name: Docker login
        if: github.ref_name == 'master'
        run: |
          echo "${DOCKER_PASS}" | docker login -u "${DOCKER_USER}" --password-stdin

      - name: Build image
        if: github.ref_name == 'master'
        run: |
          docker build -t ${DOCKER_REPO}/invoicer .

      - name: Push image
        if: github.ref_name == 'master'
        run: |
          docker push ${DOCKER_REPO}/invoicer
